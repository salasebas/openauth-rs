name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test-crate:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: openauth
            nextest_args: --all-features
          - package: openauth-core
            nextest_args: --all-features
          - package: openauth-oauth
            nextest_args: --all-features
          - package: openauth-social-providers
            nextest_args: --all-features
          - package: openauth-passkey
            nextest_args: --all-features
            doc_tests: true
          - package: openauth-sqlx
            nextest_args: --features sqlite
          - package: openauth-plugins
            nextest_args: --all-features
          - package: openauth-sso
            nextest_args: --all-features
            doc_tests: true
          - package: openauth-saml
            nextest_args: --all-features
          - package: openauth-telemetry
            nextest_args: --all-features
          - package: openauth-axum
            nextest_args: --all-features
          - package: openauth-cli
            nextest_args: --all-features
          - package: openauth-i18n
            nextest_args: --all-features
            doc_tests: true
          - package: openauth-oauth-provider
            nextest_args: --all-features
          - package: openauth-stripe
            nextest_args: --all-features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test with nextest
        run: cargo nextest run -p ${{ matrix.package }} ${{ matrix.nextest_args }}

      - name: Test openauth-telemetry default features
        if: matrix.package == 'openauth-telemetry'
        run: cargo nextest run -p openauth-telemetry

      - name: Test doctests
        if: matrix.doc_tests
        run: cargo test -p ${{ matrix.package }} --doc --all-features

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test-crate
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
